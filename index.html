<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Hisaab Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0a0e1a;color:#f1f5f9;min-height:100vh}
#loader{position:fixed;inset:0;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px}
.loader-icon{width:60px;height:60px;background:rgba(255,255,255,.2);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:2rem;animation:pulse 1.5s infinite}
.loader-name{font-size:1.8rem;font-weight:800;color:#fff}
.loader-ring{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.error-box{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1e293b;border:2px solid #ef4444;border-radius:16px;padding:24px;max-width:90%;width:400px;text-align:center}
.error-box h2{color:#ef4444;margin-bottom:16px}
.error-box p{color:#94a3b8;margin-bottom:16px;font-size:.9rem}
.error-box button{background:#667eea;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-weight:700;cursor:pointer}
.hidden{display:none!important}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-icon">📊</div>
  <div class="loader-name">Hisaab Pro</div>
  <div class="loader-ring"></div>
</div>

<div id="error-container" class="error-box hidden">
  <h2>⚠️ त्रुटी आढळी</h2>
  <p id="error-msg"></p>
  <button onclick="location.reload()">पुन्हा प्रयत्न करा</button>
</div>

<div id="app" style="display:none;padding:20px">
  <h1 style="margin-bottom:20px">Hisaab Pro - लॉगिन</h1>
  <div style="max-width:400px;margin:0 auto;background:#1e293b;padding:24px;border-radius:16px">
    <div style="margin-bottom:16px">
      <label style="display:block;margin-bottom:8px;color:#94a3b8">ईमेल</label>
      <input type="email" id="email" style="width:100%;padding:12px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#fff" placeholder="email@example.com"/>
    </div>
    <div style="margin-bottom:16px">
      <label style="display:block;margin-bottom:8px;color:#94a3b8">पासवर्ड</label>
      <input type="password" id="password" style="width:100%;padding:12px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#fff" placeholder="••••••••"/>
    </div>
    <button onclick="doLogin()" style="width:100%;padding:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer">लॉगिन करा</button>
    <div id="login-error" style="margin-top:12px;color:#ef4444;text-align:center"></div>
  </div>
</div>

<script>
// SUPABASE CONFIG
const SUPABASE_URL = 'https://thizsrfyzxtnujuxswwb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRoaXpzcmZ5enh0bnVqdXhzd3diIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MzEyMTAsImV4cCI6MjA5ODEwNzIxMH0.5Kf3FTQvIHM2zzcW3375FELTTnPtIpXVupCrZp6Jbsw';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let userProfile = null;

// ERROR HANDLER
function showError(msg) {
  console.error('Error:', msg);
  document.getElementById('loader').style.display = 'none';
  document.getElementById('error-container').classList.remove('hidden');
  document.getElementById('error-msg').textContent = msg;
}

// INIT
async function init() {
  try {
    console.log('Initializing app...');
    
    // Check Supabase connection
    const { data, error } = await sb.from('profiles').select('count', { count: 'exact', head: true });
    if (error) {
      console.error('Supabase connection error:', error);
      throw new Error('Supabase शी कनेक्ट होऊ शकले नाही: ' + error.message);
    }
    console.log('Supabase connected successfully');
    
    // Check existing session
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      currentUser = session.user;
      await loadProfile();
      showDashboard();
    } else {
      showLogin();
    }
  } catch (err) {
    showError('अ‍ॅप लोड करण्यात अयशस्वी: ' + err.message);
  }
}

async function loadProfile() {
  try {
    const { data, error } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    if (error) {
      console.error('Profile load error:', error);
      throw new Error('प्रोफाइल लोड होऊ शकली नाही');
    }
    userProfile = data;
    console.log('Profile loaded:', userProfile);
  } catch (err) {
    throw err;
  }
}

function showLogin() {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function showDashboard() {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('app').innerHTML = `
    <div style="max-width:800px;margin:0 auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
        <h1>स्वागत, ${userProfile?.full_name || currentUser.email}</h1>
        <button onclick="doLogout()" style="padding:8px 16px;background:#ef4444;color:#fff;border:none;border-radius:8px;cursor:pointer">लॉगआउट</button>
      </div>
      <div style="background:#1e293b;padding:20px;border-radius:16px;margin-bottom:16px">
        <h2 style="margin-bottom:12px">प्रोफाइल माहिती</h2>
        <p><strong>ईमेल:</strong> ${currentUser.email}</p>
        <p><strong>नाव:</strong> ${userProfile?.full_name || 'N/A'}</p>
        <p><strong>भूमिका:</strong> <span style="color:${userProfile?.role==='admin'?'#10b981':'#f59e0b'}">${userProfile?.role || 'N/A'}</span></p>
      </div>
      <div style="background:#1e293b;padding:20px;border-radius:16px">
        <h2 style="margin-bottom:12px">डेटाबेस स्थिती</h2>
        <p>✅ Supabase कनेक्टेड</p>
        <p>✅ प्रोफाइल लोड झाली</p>
        <p>✅ अ‍ॅप तयार</p>
      </div>
    </div>
  `;
  document.getElementById('app').style.display = 'block';
}

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  
  if (!email || !password) {
    document.getElementById('login-error').textContent = 'ईमेल आणि पासवर्ड आवश्यक आहे';
    return;
  }
  
  try {
    document.getElementById('login-error').textContent = 'लॉगिन होत आहे...';
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    
    if (error) throw error;
    
    currentUser = data.user;
    await loadProfile();
    showDashboard();
  } catch (err) {
    console.error('Login error:', err);
    document.getElementById('login-error').textContent = 'लॉगिन अयशस्वी: ' + err.message;
  }
}

async function doLogout() {
  await sb.auth.signOut();
  currentUser = null;
  userProfile = null;
  location.reload();
}

// Start app
window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
